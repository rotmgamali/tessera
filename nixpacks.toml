# Railway / Nixpacks build config for Tessera — a SINGLE Node service that
# serves both the /api routes and the built SPA (dist/). Build produces the
# SPA in dist/ and the compiled server in server-dist/; `npm start` runs it.
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
